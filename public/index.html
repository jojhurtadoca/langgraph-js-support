<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph Support AI</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #chat-container {
            width: 90%;
            max-width: 450px;
            height: 80vh;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #4a5568;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f7fafc;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }
        .user {
            align-self: flex-end;
            background: #4A90E2;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .bot {
            align-self: flex-start;
            background: #edf2f7;
            color: #2d3748;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .category-tag {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #718096;
        }
        #input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #4A90E2; }
        button {
            padding: 0 20px;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #357ABD; }
        button:disabled { background: #cbd5e0; cursor: not-allowed; }
        
        .typing {
            display: none;
            align-self: flex-start;
            padding: 10px 15px;
            background: #edf2f7;
            border-radius: 15px;
            margin: 0 20px 10px 20px;
            width: fit-content;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #718096;
            border-radius: 50%;
            animation: wave 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; border-left: 2px solid transparent; }
        .dot:nth-child(3) { animation-delay: -0.9s; border-left: 2px solid transparent; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
    </style>
</head>
<body>
<div id="chat-container">
    <header>AI Support Assistant</header>
    <div id="messages">
        <div class="message bot">Hello! How can I help you today?</div>
    </div>
    <div id="loader" class="typing">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Ask about billing, tech or general..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('message-input');
    const btn = document.getElementById('send-btn');
    const loader = document.getElementById('loader');
    function addMessage(text, type, category = null) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        if (category) {
            const tag = document.createElement('div');
            tag.className = 'category-tag';
            tag.textContent = `Route: ${category}`;
            div.appendChild(tag);
        }
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function send() {
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';
        input.disabled = true;
        btn.disabled = true;
        loader.style.display = 'block';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        socket.emit('chat message', text);
    }
    socket.on('bot response', (data) => {
        loader.style.display = 'none';
        input.disabled = false;
        btn.disabled = false;
        input.focus();
        if (data.error) {
            addMessage('System Error: ' + data.error, 'bot');
        } else {
            addMessage(data.reply, 'bot', data.category);
        }
    });
    btn.addEventListener('click', () => send());
    input.addEventListener('keydown', (e) => { 
        if(e.key === 'Enter') {
            e.preventDefault();
            send(); 
        }
    });
</script>
</body>
</html>
